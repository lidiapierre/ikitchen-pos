name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-secrets:
    name: Validate Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Check ANTHROPIC_API_KEY
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "❌ ANTHROPIC_API_KEY is missing"
            exit 1
          else
            echo "✅ ANTHROPIC_API_KEY is set"
          fi

      - name: Check SUPABASE_ACCESS_TOKEN
        run: |
          if [ -z "${{ secrets.SUPABASE_ACCESS_TOKEN }}" ]; then
            echo "❌ SUPABASE_ACCESS_TOKEN is missing"
            exit 1
          else
            echo "✅ SUPABASE_ACCESS_TOKEN is set"
          fi

      - name: Check SUPABASE_PROJECT_REF
        run: |
          if [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "❌ SUPABASE_PROJECT_REF is missing"
            exit 1
          else
            echo "✅ SUPABASE_PROJECT_REF is set"
          fi

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip (no source yet)
        run: echo "Typecheck will run once source code exists"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip (no source yet)
        run: echo "Lint will run once source code exists"

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip (no source yet)
        run: echo "Tests will run once source code exists"

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: apps/web
        run: npm ci
      - name: Install Playwright browsers
        working-directory: apps/web
        run: npx playwright install --with-deps chromium
      - name: Build app
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dmaogdwtgohrhbytxjqu.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_IzsBL3KELStvo6bioFKWhA_dMj81UxH
      - name: Run E2E tests
        working-directory: apps/web
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dmaogdwtgohrhbytxjqu.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_IzsBL3KELStvo6bioFKWhA_dMj81UxH

  migration-validation:
    name: Migration Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skip (no migrations yet)
        run: echo "Migration validation will run once schema exists"

  deploy-functions:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
      - name: Deploy edge functions
        run: |
          supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          
  deploy-migrations:
    name: Deploy Migrations
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy migrations
        run: supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
